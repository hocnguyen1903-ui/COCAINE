<style>
/* ==========================================================================
   5.1. ACTION PANELS (EDIT, TRANSFER, SCAN) - FIX MÀU CHỮ & ĐỒNG BỘ
   ========================================================================== */

/* 1. KHUNG PANEL TỔNG */
#edit-panel-pl, #transfer-panel-pl, #scan-panel-pl {
    display: flex !important; 
    flex-direction: column;
    position: absolute;
    top: 45px;
    left: 50%;
    opacity: 0;
    visibility: hidden;
    transform: translate(-50%, -20px) scale(0.95); 
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), visibility 0.3s;
    z-index: 2000000 !important; 
    
    background: #031c35;
    border: 1.5px solid rgba(255, 186, 8, 0.4);
    border-radius: 12px;
    padding: 20px;
    width: 450px; 
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
}

#edit-panel-pl.active, #transfer-panel-pl.active, #scan-panel-pl.active {
    opacity: 1; visibility: visible; transform: translate(-50%, 0) scale(1); pointer-events: auto;
}

/* 2. ĐỒNG BỘ DÒNG (CAO 46PX) - ÉP LẠI MÀU CHỮ TRẮNG */
.ep-opt-card, .check-row, .ep-delete-card {
    height: 46px !important;
    background: rgba(255, 255, 255, 0.05); 
    border: 1px solid rgba(255, 192, 0, 0.15); 
    border-radius: 8px; 
    padding: 0 15px !important; 
    margin-bottom: 6px !important;
    display: flex !important; 
    align-items: center !important; 
    gap: 15px !important; 
    cursor: pointer; 
    box-sizing: border-box !important;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
    
    /* 🔥 ÉP MÀU CHỮ TRẮNG SÁNG Ở ĐÂY */
    color: #FFFFFF !important; 
    font-size: 13.5px;
    font-weight: 500;
}

/* 3. ICON (VÀNG BCONS) */
.ep-opt-card i, .check-row i {
    color: #FFBA08 !important; 
    font-size: 16px; 
    width: 20px; 
    text-align: center; 
    flex-shrink: 0;
    display: flex;
    justify-content: center;
}

/* 4. ĐỊNH DẠNG RIÊNG CHO BẢNG BÀN GIAO (TRANSFER) */
.check-row span { 
    color: #FFFFFF !important; /* Đảm bảo text luôn trắng */
    flex: 1; 
}

.check-row i { margin-left: auto; }

.check-row input[type="checkbox"] { 
    width: 18px !important; height: 18px !important;
    accent-color: #FFBA08; flex-shrink: 0;
}

/* 5. ĐỊNH DẠNG RIÊNG CHO THẺ XÓA (DELETE DATA) */
.ep-delete-card {
    background: rgba(255, 77, 77, 0.03) !important;
    border: 1.5px dashed rgba(255, 77, 77, 0.4) !important;
    color: #ff7777 !important; /* Riêng thằng này chữ đỏ hồng */
}

.ep-delete-card i { color: #ff7777 !important; }
.ep-delete-card span { font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-size: 13px; }

/* 6. HIỆU ỨNG HOVER - ĐÃ TÁCH BIỆT MÀU SẮC */
.ep-opt-card:hover, .check-row:hover { 
    transform: translateX(5px) !important;
}

/* Hover cho các mục thông thường (Màu trắng/vàng) */
.ep-opt-card:not(.ep-delete-card):hover, .check-row:hover { 
    background: rgba(255, 186, 8, 0.15) !important; 
    border-color: #FFBA08 !important; 
    color: #FFFFFF !important; 
}

/* Hover riêng cho mục DELETE (Đỏ toàn bộ) */
.ep-delete-card:hover {
    background: rgba(255, 77, 77, 0.1) !important;
    border-color: #ff4040 !important;
    border-style: solid !important;
    color: #ff4040 !important;
}

.ep-delete-card:hover i, 
.ep-delete-card:hover span { 
    color: #ff4040 !important; 
}

/* Hiệu ứng phóng to icon cho tất cả các card khi hover */
.ep-opt-card:hover i, .check-row:hover i { 
    transform: scale(1.2); 
    transition: transform 0.2s ease;
}
/* Fix nếu có class disabled làm mờ chữ */
.check-row.disabled, .ep-opt-card.disabled { 
    opacity: 0.2 !important; 
    pointer-events: none; 
    filter: grayscale(1); 
}


/* --- 5.2. MODAL OVERLAYS & DIALOGS --- */
#modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(2px); z-index: 100000; }

#checklistModal, #checklistModal-pl { 
    display: none; position: fixed; z-index: 100001; left: 50%; top: 50%; transform: translate(-50%, -50%); 
    background: #222831; border: 1px solid #FFC000; border-radius: 12px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); color: white; 
}
#checklistModal-pl { width: 220px; padding: 16px 20px; border-color: rgba(255, 186, 8, 0.4); border-radius: 8px; }

/* Luxury Info Modal */
.info-modal-overlay {
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%;
    background: rgba(0, 0, 0, 0.7); 
    backdrop-filter: blur(8px);
    display: none; 
    
    /* CĂN GIỮA TOÀN MÀN HÌNH */
    align-items: center; 
    justify-content: center;
    
    /* Z-INDEX CAO HƠN HEADER (1.000.000) */
    z-index: 99999999; 
    
    opacity: 0; 
    transition: transform 0.3s ease, opacity 0.3s ease, background-color 0.3s ease;
    will-change: transform, opacity;
}
.info-modal-overlay.show { display: flex; opacity: 1; }

.info-modal-content {
    background: rgba(3, 28, 53, 0.9); border: 1px solid rgba(255, 186, 8, 0.4);
    border-radius: 20px; width: 600px; padding: 20px 30px !important;
    transform: scale(0.9); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.info-modal-overlay.show .info-modal-content { transform: scale(1); }

.info-modal-header { text-align: center; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
.info-modal-header span { color: #FFBA08; font-weight: 800; letter-spacing: 2px; font-size: 16px; text-transform: uppercase; }

.info-section-title {
    font-size: 10px; color: #505966; font-weight: 700; letter-spacing: 1.5px;
    margin-bottom: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    padding-bottom: 5px; text-transform: uppercase;
}

.info-row { display: flex; gap: 20px; margin-bottom: 20px; align-items: flex-start; }

.info-key {
    width: 38px; height: 38px; background: rgba(255, 186, 8, 0.1);
    border: 1.5px solid #FFBA08; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: #FFBA08; font-weight: 900; font-size: 20px; flex-shrink: 0;
    box-shadow: 0 0 10px rgba(255, 186, 8, 0.2);
}
.info-key i { font-size: 18px; line-height: 1; display: block; }

.info-desc b { color: #ffffff; font-size: 13px; display: block; margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
.info-desc p { color: #95A1AF; font-size: 11.5px; margin: 0; line-height: 1.8; }

.info-example {
    display: inline-block; margin-top: 18px; margin-bottom: 5px;
    font-family: 'Courier New', monospace; font-size: 12px; color: #00BCD4; 
    background: rgba(0, 188, 212, 0.08); padding: 4px 12px; 
    border-radius: 6px; border: 1px solid rgba(0, 188, 212, 0.2); line-height: 1.5; 
}

.info-tag-fixed {
    width: 120px; height: 26px; display: flex; align-items: center; justify-content: flex-start; 
    padding-left: 12px; font-size: 11px; font-weight: 700; color: #FFBA08;
    background: rgba(255, 186, 8, 0.05); border: 1.2px solid rgba(255, 186, 8, 0.4);
    border-radius: 6px; box-sizing: border-box; letter-spacing: 0.3px;
}
.info-tag-desc { color: #95A1AF; font-size: 11px; line-height: 1.4; flex: 1; }


/* --- 5.3. CONTEXT MENU (CHUỘT PHẢI LUXURY) --- */
#customContextMenu-pl {
    position: fixed; z-index: 10000000; background: rgba(128, 128, 128, 0.2) !important; 
    backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); padding: 0 !important;
    width: 230px !important; border-radius: 8px !important; box-shadow: 0 3px 7px rgba(0, 0, 0, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.08) !important; overflow: hidden;
    opacity: 0; visibility: hidden; transform: scale(0.9) translateY(-10px); 
    pointer-events: none; transition: opacity 0.2s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), visibility 0.2s;
}

#customContextMenu-pl.active { opacity: 1; visibility: visible; transform: scale(1) translateY(0); pointer-events: auto; }

.ctx-menu-item, .ctx-menu-split { background: transparent !important; border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important; border-radius: 0 !important; }
.ctx-menu-item:last-child, .ctx-menu-split:last-child { border-bottom: none !important; }

.ctx-menu-item, .ctx-main-action {
    height: 40px !important; display: flex !important; align-items: center !important;
    gap: 12px !important; padding: 0 16px !important; font-size: 13.5px; 
    font-weight: 500; cursor: pointer !important; color: rgba(255, 255, 255, 0.7); transition: all 0.25s ease;
}

.ctx-menu-split { display: flex; align-items: stretch; width: 100%; border-top: none !important; }
.ctx-main-action { flex: 1; border: none !important; } 

.ctx-gear-action { 
    width: 46px !important; display: flex !important; align-items: center !important; 
    justify-content: center !important; cursor: pointer; color: #ADADAD;
    border-left: 1px solid rgba(255, 255, 255, 0.05) !important; transition: transform 0.3s ease;
}
.ctx-gear-action:hover { background: transparent !important; color: #ADADAD !important; }
.ctx-gear-action:hover i { transform: rotate(90deg); }

.ctx-menu-item::before, .ctx-main-action::before { font-family: "bootstrap-icons" !important; font-size: 17px; width: 22px !important; text-align: center; display: inline-block; flex-shrink: 0; }

.ctx-menu-item:hover, .ctx-main-action:hover { background: rgba(255, 255, 255, 0.07) !important; color: #fff !important; }

.ctx-shadow-success, .ctx-shadow-danger { box-shadow: 0 2px 7px rgba(0, 0, 0, 0.6) !important; border-color: rgba(255, 255, 255, 0.08) !important; }

/* 1. Bàn giao: Máy bay phóng đi rồi xuất hiện lại */
.ctx-success:hover::before { 
    animation: planeFullSequence 1.5s cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards; 
    color: #2ECC71 !important; 
}

/* 2. Hủy/Xóa: Rung lắc cảnh báo */
.ctx-danger:hover::before { 
    animation: iconShake 0.4s ease-in-out; 
    color: #ff4d4d !important; 
}

/* 3. Chỉnh sửa (Edit): Nghiêng bút */
.ctx-edit:hover::before { 
    transform: rotate(-15deg) scale(1.2) !important; 
    color: #FFBA08 !important; 
    transition: transform 0.2s ease;
}

/* 4. Xem file/Nạp file: Phóng to nhẹ */
.ctx-main-action:hover::before { 
    transform: scale(1.2) !important; 
    transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
}

/* 5. Bánh răng (Settings): Xoay tròn */
.ctx-gear-action:hover i { 
    transform: rotate(45deg) scale(1.2) !important; 
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
}

/* --- 5.4. SCAN DELETE CONFIRM & GLOBAL TOOLTIP --- */
#scan-delete-confirm-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.1);
    z-index: 1005; justify-content: center; align-items: center; backdrop-filter: blur(4px);
}

.scan-delete-dialog {
    background: #031c35; border: 1.5px solid #FF0000; border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.8); width: 280px; padding: 20px 15px;
    display: flex; flex-direction: column; align-items: center; text-align: center;
    animation: popIn_PL 0.2s ease-out;
}

.scan-delete-icon { color: #ff4d4d; font-size: 32px; margin-bottom: 10px; }
.scan-delete-title { color: white; font-size: 14px; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.5px; }
.scan-delete-desc { color: #95A1AF; font-size: 11px; margin-bottom: 20px; line-height: 1.4; }
.scan-delete-actions { display: flex; gap: 10px; width: 100%; }
.scan-delete-btn { flex: 1; padding: 8px; font-size: 11px; border-radius: 6px; font-weight: bold; }
.scan-delete-btn.danger-override { background: #ff4d4d !important; color: #fff; border: none; box-shadow: 0 4px 10px rgba(255, 77, 77, 0.3); }

.global-tooltip-bcons {
    position: fixed !important; z-index: 2000000 !important; min-width: 350px; max-width: 600px; width: auto; 
    background-color: #031c35; color: #FFBA08; text-align: left; border: 1.5px solid #FFBA08; 
    border-radius: 8px; padding: 12px; font-size: 11.5px; line-height: 1.5; pointer-events: none; 
    white-space: normal; opacity: 0; visibility: hidden; transform: translate(-50%, calc(-100% + 10px)) scale(0.95); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.global-tooltip-bcons.show-tooltip { opacity: 1; visibility: visible; transform: translate(-50%, -100%) scale(1); }
.global-tooltip-bcons::after { content: ""; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border-width: 7px; border-style: solid; border-color: #FFBA08 transparent transparent transparent; }


/* --- 5.5. GLOBAL FORM OVERLAY (RAM OPTIMIZED) --- */
.form-container.dim-overlay-active::after {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(3, 28, 53, 0.85); /* Tối ưu RAM: Phủ màu trơn thay vì Blur */
    z-index: 1500; /* Nằm dưới z-index 2000 của các Panel */
    border-radius: 10px;
    pointer-events: auto; /* Chặn user click lầm vào form phía sau */
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s;
}

.form-container.dim-overlay-active.show-overlay::after {
    opacity: 1;
    visibility: visible;
}
</style>
