<div class="form-container">
    <!-- Header: Chi nhánh & Ngày tháng -->
    <div class="location-date-container"> 
        <select id="locationDropdown-pl" class="location-dropdown"></select>
        <span id="dateDisplay-pl" class="date-display"></span>
    </div>

    <form id="dataForm-pl">
        <!-- 1. Ô TÌM KIẾM HỢP ĐỒNG & DASHBOARD KẾT QUẢ -->
        <div id="main-search-container-pl" class="dropdown-container" style="position: relative; z-index: 1000;">
            <input type="text" name="field0-pl" id="field0-pl" placeholder="-- Search Contract Number --" 
                   onkeydown="masterKeyboardNav(event, 'dropdown-field0-pl', '.hoc-tooltip', 'field5-pl', (el) => selectField0_PL(el.getAttribute('data-display')))" 
                   style="border-radius: 35px" autocomplete="off">
            
            <h1>SOẠN THẢO PHỤ LỤC HỢP ĐỒNG</h1>

            <!-- Dashboard hiển thị danh sách hợp đồng (Render động từ JS) -->
            <div id="dropdown-field0-pl" class="smooth-dropdown"></div>
        </div> 

        <!-- 2. CHI TIẾT ĐIỀU CHỈNH (ADJUSTMENT DETAILS) -->
        <label style="margin-top: 14px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 7px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span><i class="bi bi-sliders"></i> Adjustment Details</span>
                <span style="font-size: 11px; color: #505966; font-style: italic;">Select options below</span>
            </div>
            <div class="dropdown-container">
                <input type="text" readonly name="field5-pl" id="field5-pl" 
                       placeholder="-- Chọn thông tin điều chỉnh --" 
                       onclick="showDropdown_PL5(); event.stopPropagation();"
                       style="cursor: pointer;"> 
                <span class="dropdown-icon" onclick="toggleDropdown_PL5()" style="cursor: pointer;">⏷</span>
                <div id="dropdown-field5-pl" class="smooth-dropdown"></div>
            </div>
        </label>

        <!-- 3. CÁC TRƯỜNG HIỆN ĐỘNG KHI CHỌN NỘI DUNG ĐIỀU CHỈNH -->
        <label id="label-field2-pl" style="display: none;"><i class="bi bi-cash-coin"></i> Additional value
            <input type="text" name="field2-pl" id="field2-pl" placeholder="-- Nhập giá trị phát sinh --" onclick="this.select()" oninput="formatInput_PL(this)">
        </label>

        <label id="label-field9-pl" style="display: none;"><i class="bi bi-calendar-event"></i> Extend the schedule
            <div class="dropdown-container">
                <input type="text" name="field9-pl" id="field9-pl" placeholder="-- Chọn thời gian gia hạn --" onclick="this.select()" readonly>
                <span class="calendar-icon"><i class="bi bi-calendar2-week"></i></span>
            </div>
        </label>

        <!-- 4. SỐ PHỤ LỤC DỰ KIẾN (READ-ONLY) -->
        <label><i class="bi bi-view-list"></i> Appendix Number
            <input type="text" name="field8-pl" id="field8-pl" class="readonly-dark" style="border-radius: 35px" placeholder="Difference in confidence!" readonly>
        </label>
    </form>
    
    <!-- 5. HỆ THỐNG NÚT BẤM (FOOTER ACTIONS) -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 60px;">
        <!-- GÓC TRÁI: HƯỚNG DẪN & XUẤT DATA SANG SHEET -->
        <div style="display: flex; align-items: center; gap: 10px;">
            <button type="button" class="btn-info-luxury" onclick="showSearchGuide_PL()">
                <i class="bi bi-info-circle"></i>
            </button>

            <button type="button" class="submit-button" onclick="exportFilteredToNewSheet_PL()" style="min-width: 120px;">
                <i class="bi bi-file-earmark-spreadsheet"></i> Export Data
            </button>
        </div>

        <!-- GÓC PHẢI: TÙY CHỌN PL01, CANCEL & XUẤT FILE DOCS -->
        <div class="button-container" style="margin-top: 0;">
            <div class="checkbox-container" id="pl01-wrapper" style="opacity: 0.4; cursor: not-allowed;">
                <input type="checkbox" id="pl01Checkbox-pl" name="pl01-pl" onchange="updateContractNo_PL()" disabled style="cursor: pointer;">
                <label for="pl01Checkbox-pl" style="cursor: pointer;">PL01</label>
            </div>
            <button type="button" class="clear-button" onclick="clearForm_PL();">Cancel</button>
            <button type="button" id="submitButton-pl" class="submit-button" onclick="submitData_PL()">Export File</button>
        </div>
    </div>
</div>
