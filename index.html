    <script>
        // DÁN LINK GOOGLE WEB APP CỦA MÀY VÀO ĐÂY
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzG7aVeSXeXm0KgIIouCYXM1h4JXtUbV2TmT2qPdvDd7o7cuE0by0GzHIVG7cyD1ZFM/exec";
        
        async function callBackend(action, data = {}) {
            try {
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: action, data: data })
                });
                const result = await response.json();
                if (result.status === "error") throw new Error(result.message);
                return result.data;
            } catch (error) {
                console.error("Lỗi API:", error);
                return null;
            }
        }
    </script>
