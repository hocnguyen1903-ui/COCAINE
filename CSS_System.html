<style>
/* ==========================================================================
   NHÓM 6: SYSTEM & FEEDBACK (LOADERS, PROGRESS BARS & DROP ZONES)
   ========================================================================== */

/* --- 6.1. LUXURY ZEN LOADERS (V4.6 - SOFT GLOW & PEAK SYNC) --- */
:root {
    --metallic-gold: #D1A054;  /* Vàng đồng lỳ */
    --peak-gold: #FFBA08;      /* Vàng đỉnh logo */
    --metallic-glow: rgba(209, 160, 84, 0.15); /* Hào quang cực loãng */
    --peak-glow: rgba(255, 192, 0, 0.35);      /* Hào quang đỉnh dịu nhẹ */
}

.luxury-loader {
    position: fixed; 
    top: 65px; left: 0; 
    width: 100vw; height: calc(100vh - 65px); 
    display: flex; justify-content: center; align-items: center;
    z-index: 999999; 
    backdrop-filter: blur(15px) saturate(120%);
    -webkit-backdrop-filter: blur(15px) saturate(120%);
    animation: luxuryBgPulse 3s ease-in-out infinite;
}

.loader-content {
    display: flex; flex-direction: column; align-items: center; gap: 35px;
    margin-top: -65px; 
}

/* Logo Pulse */
.bcons-logo-img-pulse {
    width: 110px;
    height: auto;
    animation: luxuryLogoBreathe 3s ease-in-out infinite;
    user-select: none; -webkit-user-drag: none;
}

/* Shimmer Bar */
.shimmer-bar {
    width: 220px; height: 2px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 10px; position: relative; overflow: hidden;
}

.shimmer-bar::after {
    content: ""; position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, var(--peak-gold), transparent);
    opacity: 0.6; 
    animation: shimmerSlide 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
}

/* Loader Text */
.loader-text {
    font-family: 'Poppins', sans-serif !important;
    font-size: 9.5px; 
    font-weight: 700;
    letter-spacing: 8px; 
    text-transform: uppercase;
    margin: 0; 
    padding-left: 8px;
    color: #FFBA08; 
    animation: textFadeColorPulse 3s ease-in-out infinite;
}


/* --- 6.2. SCAN MANAGEMENT & PROGRESS FEEDBACK --- */
.scan-drop-zone { 
    border: 2px dashed rgba(149, 161, 175, 0.4); 
    border-radius: 12px; 
    padding: 15px 10px; 
    text-align: center; 
    cursor: pointer; 
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    min-height: 100px; 
    position: relative; 
    background: rgba(0, 0, 0, 0.25);
}

.scan-drop-zone:hover { 
    background: rgba(255, 186, 8, 0.05); 
    border-color: rgba(255, 186, 8, 0.5); 
}

.scan-drop-zone.dragover { 
    background: rgba(255, 186, 8, 0.15) !important; 
    border-color: #FFBA08 !important; 
    transform: scale(0.98); 
}

/* Progress Bar Shine Effect */
#scan-progress-bar { 
    position: relative; 
    overflow: hidden; 
    transition: width 0.3s ease, background-color 0.3s ease; 
    background-color: #FFBA08; 
}

#scan-progress-bar::after { 
    content: ""; 
    position: absolute; 
    top: 0; left: -100%; 
    width: 50%; 
    height: 100%; 
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent); 
    transform: skewX(-25deg); 
    animation: barShine 1.2s infinite; 
}

#scan-progress-bar.finished { 
    background-color: #2ECC71 !important; 
}

#scan-progress-bar.finished::after { 
    display: none; 
}

/* Alert Icon Luxury */
.icon-alert-luxury {
    display: inline-block;
    filter: drop-shadow(0 0 12px rgba(255, 77, 77, 0.6));
}
</style>
